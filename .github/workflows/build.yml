name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
        npm install

    - name: Build CSS
      run: npm run build:css

    - name: Build application (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: build.bat

    - name: Build application (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        chmod +x ./build.sh
        ./build.sh

    # --- 新增：把打包生成的文件压缩成 ZIP ---
    - name: Zip build outputs (Windows)
      if: matrix.os == 'windows-latest'
      # 使用 PowerShell 将 dist 目录打包为 zip
      run: powershell Compress-Archive -Path dist\* -DestinationPath contest-system-windows.zip

    - name: Zip build outputs (macOS)
      if: matrix.os == 'macos-latest'
      # 使用 macOS 自带的 zip 命令
      run: |
        cd dist
        zip -r ../contest-system-macos.zip .
    # -------------------------------------

    # 修改：这里不再上传整个 dist 目录，而是只上传刚才打包好的 zip 文件
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: '*.zip' 

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        # 修改：Release 页面只挂载 zip 文件，避免海量文件导致报错
        files: |
          dist-artifacts/**/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}