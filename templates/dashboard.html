<!-- 主页面 -->
<div id="main-page" class="hidden min-h-screen bg-gray-100">
    <!-- 顶部导航栏 -->
    <nav class="bg-indigo-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center">
            <img src="/static/logo.png" alt="Logo" class="h-8 w-8 mr-3 object-contain rounded">
            <div class="text-xl font-bold">竞赛回收系统</div>
        </div>
    </nav>

    <!-- 顶部信息区 -->
    <div class="container mx-auto px-4 py-6 mb-8">
        <div class="flex justify-between items-end">
            <!-- 左侧个人信息 -->
            <div class="flex items-center space-x-4">
                <!-- 圆形用户头像 -->
                <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <!-- 姓名和准考证号 -->
                <div>
                    <div class="text-2xl font-bold">
                        <span id="dashboard-student-name"></span>
                    </div>
                    <div class="text-sm text-gray-500 mt-1">
                        准考证号：
                        <span id="dashboard-student-id" class="bg-gray-100 text-gray-800 px-2 py-1 rounded-md"></span>
                    </div>
                </div>
            </div>
            <!-- 右侧操作区 -->
            <div>
                <button id="logout-btn" class="border border-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-red-50 hover:text-red-600 transition-colors">
                    退出登录
                </button>
            </div>
        </div>
    </div>

    <!-- 选项卡导航 -->
    <div class="container mx-auto px-4">
        <div class="border-b border-gray-200">
            <nav class="flex -mb-px">
                <button onclick="switchTab('instructions')" id="tab-btn-instructions" class="py-4 px-6 border-b-2 border-transparent hover:text-gray-600 hover:border-gray-300 whitespace-nowrap">
                    考试须知
                </button>
                <button onclick="switchTab('problems')" id="tab-btn-problems" class="py-4 px-6 border-b-2 border-indigo-500 text-indigo-600 font-medium whitespace-nowrap">
                    题目列表
                </button>
                <button onclick="switchTab('notifications')" id="tab-btn-notifications" class="py-4 px-6 border-b-2 border-transparent hover:text-gray-600 hover:border-gray-300 whitespace-nowrap relative">
                    消息通知
                    <span id="notification-badge" class="hidden absolute top-2 right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">1</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- 内容区域 -->
    <div class="container mx-auto px-4 py-8">
        <!-- 考试须知 -->
        <div id="tab-instructions" class="bg-white p-6 rounded-lg shadow hidden">
            <h3 class="text-lg font-bold mb-4">考试须知</h3>
            <div id="dashboard-instructions" class="prose prose-indigo max-w-none prose-sm md:prose-base"></div>
        </div>

        <!-- 题目列表 -->
        <div id="tab-problems" class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-bold mb-6">题目列表</h3>
            <div id="problems-list" class="overflow-x-auto"></div>
        </div>

        <!-- 消息通知 -->
        <div id="tab-notifications" class="bg-white p-6 rounded-lg shadow hidden">
            <h3 class="text-lg font-bold mb-4">消息通知</h3>
            <div id="notifications-list" class="space-y-4">
                <!-- 消息将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </div>
</div>

<!-- 提交代码模态框 -->
<div id="upload-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 max-w-md w-full">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modal-title" class="text-lg font-bold">上传代码</h3>
            <button onclick="closeUploadModal()" class="text-gray-500 hover:text-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="mb-4">
            <input type="file" id="modal-file-input" accept=".cpp" class="w-full">
        </div>
        <div class="mb-4 text-red-500 text-sm">
            注意：只允许提交 .cpp 文件（最大100KB）。重新提交将覆盖之前的代码！
        </div>
        <div class="flex justify-end space-x-2">
            <button onclick="closeUploadModal()" class="bg-gray-300 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-400">取消</button>
            <button onclick="confirmUpload()" id="confirm-upload-btn" class="bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700">确认上传</button>
        </div>
        <div id="modal-status" class="mt-4 text-sm hidden"></div>
    </div>
</div>
